<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kasir Cafe POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root,[data-theme="light"]{
      --bg:#f5f4f0;--surface:#faf9f6;--surface2:#fff;--offset:#eae7e0;--border:#d8d3ca;
      --text:#231f18;--muted:#7a7570;--faint:#a8a49d;
      --primary:#01696f;--primary2:#0c4e54;--primary-light:#e0efee;
      --success:#437a22;--warn:#c67a0a;--danger:#a13544;
      --radius:.9rem;--shadow:0 4px 18px rgba(20,20,20,.07)
    }
    [data-theme="dark"]{
      --bg:#171614;--surface:#1c1b19;--surface2:#242220;--offset:#302e2b;--border:#3d3934;
      --text:#ede6da;--muted:#b0a898;--faint:#807870;
      --primary:#56a6b2;--primary2:#7bc3ce;--primary-light:#1e3335;--shadow:0 8px 32px rgba(0,0,0,.35)
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
    button,input,select,textarea{font:inherit;color:inherit}
    button{cursor:pointer;border:none;background:none}
    table{width:100%;border-collapse:collapse}
    th,td{padding:.7rem .8rem;border-bottom:1px solid var(--border);text-align:left;font-size:.88rem;vertical-align:middle}
    th{font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--offset)}

    /* LAYOUT */
    .app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1rem .8rem;position:sticky;top:0;height:100vh;overflow-y:auto;overflow-x:hidden}
    .content{padding:1rem 1.2rem;min-width:0}

    /* SIDEBAR */
    .brand{display:flex;gap:.7rem;align-items:center;margin-bottom:1.2rem;padding:.5rem .3rem}
    .brand svg{width:38px;height:38px;flex-shrink:0;color:var(--primary)}
    .brand h1{font-size:.97rem;font-weight:800;line-height:1.2}
    .brand p{font-size:.72rem;color:var(--muted)}
    .menu-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);margin:1rem .4rem .4rem}
    .nav-btn{width:100%;display:flex;justify-content:space-between;align-items:center;padding:.65rem .75rem;border-radius:.7rem;margin-bottom:.15rem;font-size:.88rem;transition:background .15s,color .15s}
    .nav-btn:hover,.nav-btn.active{background:var(--primary-light);color:var(--primary)}
    .nav-btn.active{font-weight:700}

    /* TOP BAR */
    .topbar{display:flex;justify-content:space-between;gap:.8rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
    .topbar h2{font-size:1.35rem;font-weight:800;margin-bottom:.1rem}
    .topbar p{font-size:.83rem;color:var(--muted)}
    .actions,.toolbar{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
    .btn{padding:.65rem .95rem;border-radius:.75rem;font-weight:700;font-size:.85rem;transition:background .15s,opacity .15s}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary2)}
    .btn-secondary{background:var(--surface);border:1px solid var(--border)}
    .btn-secondary:hover{background:var(--offset)}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-sm{padding:.4rem .65rem;font-size:.8rem;border-radius:.55rem}

    .section{display:none}.section.active{display:block}
    .grid{display:grid;gap:.85rem}
    .g2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem;box-shadow:var(--shadow)}
    .card h3{font-size:.95rem;font-weight:700;margin-bottom:.5rem}
    .muted{color:var(--muted)}.faint{color:var(--faint)}
    .input,.select,.textarea{width:100%;padding:.65rem .8rem;border:1px solid var(--border);border-radius:.7rem;background:var(--surface2);font-size:.88rem}
    .input:focus,.select:focus,.textarea:focus{outline:2px solid var(--primary);outline-offset:1px}
    .textarea{min-height:90px;resize:vertical}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.75rem}
    .form-group{display:grid;gap:.3rem}
    .form-group label{font-size:.83rem;font-weight:600}
    .full{grid-column:1/-1}
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:.8rem}
    .badge{display:inline-flex;padding:.22rem .55rem;border-radius:999px;background:var(--offset);font-size:.74rem;font-weight:700}
    .ok{color:var(--success)}.warn-color{color:var(--warn)}

    /* ─── KASIR LAYOUT ─── */
    .kasir-wrap{display:grid;grid-template-columns:1fr 380px;gap:1rem;align-items:start}
    .kasir-left{display:grid;gap:.85rem}

    /* toolbar kasir */
    .kasir-toolbar{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
    .kasir-search{flex:1;min-width:160px;padding:.6rem .85rem;border:1px solid var(--border);border-radius:.7rem;background:var(--surface2);font-size:.88rem}

    /* terlaris strip */
    .terlaris-strip{display:flex;gap:.55rem;overflow-x:auto;padding-bottom:.3rem}
    .terlaris-strip::-webkit-scrollbar{height:4px}
    .terlaris-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .terlaris-chip{flex-shrink:0;display:flex;align-items:center;gap:.45rem;background:var(--primary-light);border:1px solid var(--primary);border-radius:.7rem;padding:.45rem .75rem;font-size:.82rem;font-weight:700;cursor:pointer;color:var(--primary);transition:background .15s}
    .terlaris-chip:hover{background:var(--primary);color:#fff}
    .terlaris-chip .chip-price{font-weight:400;font-size:.76rem;opacity:.8}

    /* product thumbnail grid */
    .product-thumb-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.55rem}
    .product-thumb{background:var(--surface2);border:1px solid var(--border);border-radius:.75rem;padding:.65rem .55rem .55rem;display:flex;flex-direction:column;align-items:center;gap:.3rem;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:center;-webkit-tap-highlight-color:transparent}
    .product-thumb:hover,.product-thumb:active{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
    .product-thumb .thumb-icon{width:40px;height:40px;border-radius:.55rem;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:.1rem}
    .product-thumb .thumb-icon.makanan{background:#fef0e0}
    .product-thumb .thumb-icon.minuman{background:#e0f0ef}
    .product-thumb .thumb-name{font-size:.78rem;font-weight:700;line-height:1.2}
    .product-thumb .thumb-price{font-size:.74rem;color:var(--primary);font-weight:600}
    .product-thumb .thumb-badge{font-size:.66rem;padding:.12rem .4rem;border-radius:999px;background:var(--offset);color:var(--muted)}

    /* CART (kanan) sticky */
    .kasir-right{position:sticky;top:1rem;display:grid;gap:.85rem;align-self:start}
    .cart-list{display:flex;flex-direction:column;gap:.55rem;max-height:38vh;overflow-y:auto;padding-right:.2rem}
    .cart-list::-webkit-scrollbar{width:4px}
    .cart-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .cart-item{display:flex;justify-content:space-between;align-items:center;gap:.6rem;padding:.6rem .7rem;border:1px solid var(--border);border-radius:.7rem;background:var(--surface2)}
    .cart-item-info{flex:1;min-width:0}
    .cart-item-info .ci-name{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cart-item-info .ci-price{font-size:.78rem;color:var(--muted)}
    .cart-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem}
    .kasir-layout{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(320px,.85fr);gap:.85rem;align-items:start}
    .cart-panel{position:sticky;top:.75rem}
    @media (max-width: 900px){.kasir-layout{grid-template-columns:1fr}.kasir-right{order:-1;position:sticky;top:.55rem;z-index:8}.kasir-layout > div:first-child{order:2}.cart-panel{position:static;background:var(--bg)}.cart-list{max-height:24vh}.product-thumb-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    .qty-row{display:flex;align-items:center;gap:.35rem}
    .qty-btn{width:28px;height:28px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:background .12s}
    .qty-btn:hover{background:var(--offset)}
    .subtotal-row{font-size:.82rem;font-weight:700;color:var(--primary)}

    /* payment */
    .pay-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.45rem}
    .pay-chip{padding:.6rem;border:1.5px solid var(--border);border-radius:.65rem;background:var(--surface2);font-weight:700;font-size:.78rem;text-align:center;transition:background .15s,border-color .15s}
    .pay-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .cash-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.4rem}
    .cash-chip{padding:.55rem;border:1px solid var(--border);border-radius:.6rem;background:var(--surface2);font-size:.78rem;font-weight:600;text-align:center}
    .cash-chip:hover{background:var(--offset)}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;border-bottom:1px dashed var(--border)}
    .summary-row:last-child{border:none;font-weight:800;font-size:1rem}

    /* open bill strip */
    .ob-strip{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.2rem}
    .ob-chip{flex-shrink:0;display:flex;flex-direction:column;background:var(--surface2);border:1px solid var(--border);border-radius:.65rem;padding:.45rem .65rem;font-size:.78rem;cursor:pointer;transition:border-color .15s}
    .ob-chip:hover{border-color:var(--primary);color:var(--primary)}
    .ob-chip strong{font-size:.82rem}

    /* Mobile toggle */
    .mobile-toggle{display:none;padding:.6rem .85rem;background:var(--surface);border:1px solid var(--border);border-radius:.7rem;font-size:.85rem;font-weight:700}

    /* Print modal */
    .print-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem}
    .print-modal.open{display:flex}
    .print-panel{width:min(1100px,100%);max-height:92vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:1.2rem;box-shadow:var(--shadow)}
    .receipt-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;margin-top:1rem}
    .receipt{background:#fff;color:#000;border:1px dashed #888;padding:.9rem;font-family:monospace;font-size:11px;min-height:260px}
    .check-row{display:flex;gap:1.2rem;flex-wrap:wrap;margin-top:.6rem;align-items:center}
    .check-row label{display:flex;align-items:center;gap:.4rem;font-size:.88rem;cursor:pointer}
    .print-root{display:none}

    /* Responsive */
    @media(max-width:1200px){.product-thumb-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media(max-width:980px){.kasir-wrap{grid-template-columns:1fr}.kasir-right{position:static}.product-thumb-grid{grid-template-columns:repeat(4,minmax(0,1fr))}.receipt-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:860px){
      .app{grid-template-columns:1fr}
      .sidebar{position:fixed;left:0;top:0;bottom:0;width:min(85vw,300px);z-index:30;transform:translateX(-101%);transition:transform .22s ease}
      .sidebar.open{transform:translateX(0)}
      .mobile-toggle{display:inline-flex}
      .content{padding:.8rem}
      .product-thumb-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
      .g2,.form-grid,.pay-grid{grid-template-columns:1fr}
      .cash-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .receipt-grid{grid-template-columns:1fr}
    }
    @media(max-width:480px){.product-thumb-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media print{
      body *{visibility:hidden !important}
      #printRoot,#printRoot *{visibility:visible !important}
      #printRoot{display:block !important;position:absolute;left:0;top:0;width:100%;background:#fff}
      .print-sheet{page-break-after:always;break-after:page;padding:10px}
      .print-sheet:last-child{page-break-after:auto;break-after:auto}
      .receipt{border:none;max-width:none;width:72mm;min-height:auto;padding:2mm}
    }
  </style>
</head>

const debounceMap={};

}
function fromDbRows(sheet, rows){

  if(sheet==='Bahan') return rows.map(r=>({nama:r.nama,satuan:r.satuan,hargaSatuan:Number(r.harga_satuan||0),stok:Number(r.stok||0)}));
  if(sheet==='Resep') return rows.map(r=>({produk:r.produk,bahan:r.bahan,qty:Number(r.qty||0),satuan:r.satuan}));
  if(sheet==='Pelanggan') return rows.map(r=>({nama:r.nama,telepon:r.telepon||'',alamat:r.alamat||''}));
  if(sheet==='OpenBill') return rows.map(r=>({kode:r.kode,atasNama:r.atas_nama||'',metodeBayar:r.metode_bayar||'tunai',total:Number(r.total||0),cart:r.cart||[]}));

  if(sheet==='TransaksiDetail') return rows.map(r=>({nota:r.nota,tanggal:r.tanggal,waktu:r.waktu,atasNama:r.atas_nama||'',produk:r.produk,qty:Number(r.qty||0),harga:Number(r.harga||0),subtotal:Number(r.subtotal||0),kategori:r.kategori||''}));
  if(sheet==='Kas') return rows.map(r=>({tanggal:r.tanggal,tipe:r.tipe,kategori:r.kategori,nominal:Number(r.nominal||0),keterangan:r.keterangan||''}));
  if(sheet==='Karyawan') return rows.map(r=>({nama:r.nama,aktif:r.aktif||'Ya'}));
  if(sheet==='ShiftKaryawan') return rows.map(r=>({tanggal:r.tanggal,nama:r.nama,shift:r.shift||'pagi',catatan:r.catatan||''}));
  if(sheet==='PayrollSetting') return rows.map(r=>({nama:r.nama,gajiPagi:Number(r.gaji_pagi||0),gajiSore:Number(r.gaji_sore||0)}));
  if(sheet==='Owner') return rows.map(r=>({username:r.username,password:r.password}));
  if(sheet==='Setting') return rows.map(r=>({key:r.key,value:r.value||''}));
  return rows;
}
async function loadSheet(sheet){const table=TABLE_MAP[sheet]; const {data,error}=await sbClient.from(table).select('*'); if(error) throw error; db[sheet]=fromDbRows(sheet,data||[]); return db[sheet]}
async function saveSheet(sheet){const table=TABLE_MAP[sheet]; const rows=toDbRows(sheet,db[sheet]||[]); if(sheet==='Produk'){const {data:check,error:checkErr}=await sbClient.from(table).select('*').limit(1); if(checkErr) throw new Error('SELECT '+table+': '+checkErr.message); const ins=await sbClient.from(table).insert(rows).select(); if(ins.error) throw new Error('INSERT '+table+': '+ins.error.message); if(!Array.isArray(ins.data) || ins.data.length===0) throw new Error('INSERT '+table+' tidak menghasilkan row'); return {ok:true, inserted:ins.data.length, check:(check||[]).length};} const del=await sbClient.from(table).delete().neq('id','00000000-0000-0000-0000-000000000000').select(); if(del.error) throw del.error; if((db[sheet]||[]).length && Array.isArray(del.data) && del.data.length===0 && sheet!=='OpenBill' && sheet!=='Transaksi' && sheet!=='TransaksiDetail'){console.warn('Delete returned 0 rows for', sheet, 'possible RLS/select issue');} if(rows.length){const ins=await sbClient.from(table).insert(rows).select(); if(ins.error) throw ins.error; if(!Array.isArray(ins.data) || ins.data.length===0) throw new Error('Insert tidak menghasilkan row. Cek RLS/policy tabel '+table);} return {ok:true}}

// ===== CSV EXPORT / IMPORT =====
function toCsv(rows){
  if(!rows||rows.length===0) return '';
  const keys=Object.keys(rows[0]);
  const escape=v=>{const s=String(v??''); return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
  return [keys.join(','),...rows.map(r=>keys.map(k=>escape(r[k])).join(','))].join('\n');
}
function downloadCsv(filename,rows){
  const blob=new Blob([toCsv(rows)],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function parseCsv(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2) return [];
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur);cur='';}else cur+=c;}
    vals.push(cur);
    const obj={};headers.forEach((h,i)=>obj[h]=vals[i]?.replace(/^"|"$/g,'')||'');
    return obj;
  });
}

function dateToday(){return new Date().toISOString().slice(0,10)}
function inDateRange(d,s,e){if(!s&&!e)return true;if(s&&d<s)return false;if(e&&d>e)return false;return true}
function productIcon(kategori){return kategori==='minuman'?'☕':'🍽️'}

function topProducts(n=3){
  const map={};
  db.TransaksiDetail.forEach(d=>{map[d.produk]=(map[d.produk]||0)+Number(d.qty||0)});
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([nama])=>nama);
  if(sorted.length<n){
    db.Produk.filter(p=>p.aktif==='Ya'&&!sorted.includes(p.nama)).slice(0,n-sorted.length).forEach(p=>sorted.push(p.nama));
  }
  return sorted;
}

async function apiRequest(payload){
  const apiUrl=getSetting('api_url')||CONFIG.apiUrl;
  const spreadsheetId=getSetting('spreadsheet_id')||CONFIG.spreadsheetId;
  if(!apiUrl||!spreadsheetId||CONFIG.useMockData)return{ok:true,data:db[payload.sheet]||[]};
  const res=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({...payload,spreadsheetId})});
  return await res.json();
}

function todayDate(){return dateToday()}
function startOfMonth(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,10)}
function paymentBreakdown(start,end){const out={};filteredTransactions(start,end).forEach(t=>{const k=(t.metodeBayar||'-').toUpperCase();out[k]=(out[k]||0)+Number(t.total||0)});return out}
function kasRangeFiltered(start,end){return db.Kas.filter(k=>inDateRange(k.tanggal,start,end))}
function kasSummary(start,end){const rows=kasRangeFiltered(start,end);const masuk=rows.filter(x=>String(x.tipe).toLowerCase()==='masuk').reduce((s,x)=>s+Number(x.nominal||0),0);const keluar=rows.filter(x=>String(x.tipe).toLowerCase()==='keluar').reduce((s,x)=>s+Number(x.nominal||0),0);return {masuk,keluar,saldo:masuk-keluar}}
function ensurePayrollRow(nama){let r=db.PayrollSetting.find(x=>x.nama===nama);if(!r){r={nama,gajiPagi:50000,gajiSore:50000};db.PayrollSetting.push(r)}return r}
function shiftMultiplier(shift){if(shift==='midle') return 1.5; if(shift==='full') return 2; return 1}
function shiftBaseType(shift){if(shift==='sore') return 'gajiSore'; return 'gajiPagi'}
function shiftsThisMonth(){const s=startOfMonth(), e=todayDate(); return db.ShiftKaryawan.filter(x=>inDateRange(x.tanggal,s,e))}
function payrollThisMonth(){return db.Karyawan.map(k=>{const base=ensurePayrollRow(k.nama); const rows=shiftsThisMonth().filter(x=>x.nama===k.nama); let total=0,pagi=0,sore=0,midle=0,full=0; rows.forEach(r=>{if(r.shift==='pagi') pagi++; if(r.shift==='sore') sore++; if(r.shift==='midle') midle++; if(r.shift==='full') full++; total += Number(base[shiftBaseType(r.shift)]||0) * shiftMultiplier(r.shift)}); return {nama:k.nama,pagi,sore,midle,full,jumlah:rows.length,total};})}
function totalBelanjaKas(start,end){return kasRangeFiltered(start,end).filter(x=>String(x.tipe).toLowerCase()==='keluar').reduce((s,x)=>s+Number(x.nominal||0),0)}
function grossProfit(start,end){return filteredTransactions(start,end).reduce((s,t)=>s+(Number(t.total||0)-Number(t.hpp||0)),0)}
function ensureOwnerFallback(){if(!Array.isArray(db.Owner)||!db.Owner.length){db.Owner=[{username:'owner',password:'123456'}]; return db.Owner;} const valid=db.Owner.filter(x=>String(x.username||'').trim()&&String(x.password||'').trim()); if(!valid.length){db.Owner=[{username:'owner',password:'123456'}]; return db.Owner;} return db.Owner}

function switchSection(name){

  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

  if(window.innerWidth<861)document.getElementById('sidebar').classList.remove('open');

function addProductToCart(nama){
  const p=getProduct(nama);if(!p)return;
  const idx=state.cart.findIndex(x=>x.nama===nama);
  if(idx>=0)state.cart[idx].qty+=1;
  else state.cart.push({nama:p.nama,kategori:p.kategori,harga:Number(p.harga),qty:1});
  renderKasir();
}

function loadOpenBill(idx){

function reduceStockFromRecipes(items){
  items.forEach(item=>{
    db.Resep.filter(r=>r.produk===item.nama).forEach(r=>{
      const b=getBahan(r.bahan);
      if(b)b.stok=Number(b.stok||0)-(Number(r.qty||0)*Number(item.qty||0));
    });
  });
}

function openPrintModal(bundle){
  state.printBundle=bundle;

  document.getElementById('chkBar').checked=bundle.bar.length>0;
  document.getElementById('chkKitchen').checked=bundle.kitchen.length>0;

function refreshPrintModal(){
  if(!state.printBundle)return;
  const {guest,bar,kitchen,trx}=state.printBundle;
  document.getElementById('modalGuest').innerHTML=receiptHtml('guest',guest,trx);
  document.getElementById('modalBar').innerHTML=receiptHtml('bar',bar,trx);
  document.getElementById('modalKitchen').innerHTML=receiptHtml('kitchen',kitchen,trx);
  document.getElementById('modalGuest').style.display=document.getElementById('chkGuest').checked?'':'none';

function buildPrintRoot(){
  if(!state.printBundle)return;
  const root=document.getElementById('printRoot');
  const{guest,bar,kitchen,trx}=state.printBundle;
  const parts=[];
  if(document.getElementById('chkGuest').checked)parts.push(`<div class="print-sheet"><div class="receipt">${receiptHtml('guest',guest,trx)}</div></div>`);
  if(document.getElementById('chkBar').checked&&bar.length)parts.push(`<div class="print-sheet"><div class="receipt">${receiptHtml('bar',bar,trx)}</div></div>`);
  if(document.getElementById('chkKitchen').checked&&kitchen.length)parts.push(`<div class="print-sheet"><div class="receipt">${receiptHtml('kitchen',kitchen,trx)}</div></div>`);
  root.innerHTML=parts.join('');
}

async function completePayment(){
  if(!state.cart.length)return alert('Keranjang masih kosong');
  if(state.paymentMethod==='tunai'&&Number(state.cashReceived||0)<cartSubtotal())return alert('Uang tunai kurang');
  const nota=uid('TRX'),tgl=dateToday(),atasNama=currentOrderName(),items=[...state.cart],split=groupedKitchen(items);
  const trx={nota,tanggal:tgl,atasNama,metodeBayar:state.paymentMethod,total:cartSubtotal(),hpp:cartHpp(),laba:cartSubtotal()-cartHpp(),tunai:state.paymentMethod==='tunai'?state.cashReceived:0,kembalian:state.paymentMethod==='tunai'?changeAmount():0};
  db.Transaksi.push(trx);
  items.forEach(i=>db.TransaksiDetail.push({nota,tanggal:tgl,atasNama,produk:i.nama,qty:i.qty,harga:i.harga,subtotal:i.qty*i.harga,kategori:i.kategori}));
  if(state.paymentMethod==='tunai'){db.Kas.push({tanggal:tgl,tipe:'Masuk',kategori:'Penjualan Tunai',nominal:cartSubtotal(),keterangan:'Auto dari kasir '+nota});}
  reduceStockFromRecipes(items);
  await trySaveSheets(['Transaksi','TransaksiDetail','Bahan','Kas'],'Transaksi tersimpan ke Supabase');
  state.cart=[];state.cashReceived=0;state.orderName='';
  renderAll();switchSection('kasir');
  openPrintModal({guest:items,bar:split.bar,kitchen:split.dapur,trx});
}

function reprintTransaction(index){
  const start=state.historyFilterStart,end=state.historyFilterEnd;
  const trx=filteredTransactions(start,end)[index];if(!trx)return;
  const items=db.TransaksiDetail.filter(d=>d.nota===trx.nota).map(d=>({nama:d.produk,qty:d.qty,harga:d.harga,kategori:d.kategori}));
  const split=groupedKitchen(items);
  openPrintModal({guest:items,bar:split.bar,kitchen:split.dapur,trx});
}

  });
  document.getElementById('mobileToggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
  document.getElementById('syncBtn').addEventListener('click',syncSheets);
  document.getElementById('saveCurrentBtn').addEventListener('click',saveCurrentSection);
  document.getElementById('closePrintModal').addEventListener('click',()=>document.getElementById('printModal').classList.remove('open'));
  document.getElementById('confirmPrintBtn').addEventListener('click',doPrintSelected);
  ['chkGuest','chkBar','chkKitchen'].forEach(id=>document.getElementById(id).addEventListener('change',refreshPrintModal));

  document.addEventListener('click',async e=>{
    const ap=e.target.closest('[data-add-product]');if(ap)addProductToCart(ap.dataset.addProduct);
    const qm=e.target.closest('[data-qty-minus]');if(qm){const i=Number(qm.dataset.qtyMinus);if(state.cart[i]){if(state.cart[i].qty<=1)state.cart.splice(i,1);else state.cart[i].qty-=1;renderKasir()}}
    const qp=e.target.closest('[data-qty-plus]');if(qp){const i=Number(qp.dataset.qtyPlus);if(state.cart[i]){state.cart[i].qty+=1;renderKasir()}}
    const rm=e.target.closest('[data-remove-cart]');if(rm){state.cart.splice(Number(rm.dataset.removeCart),1);renderKasir()}
    const pm=e.target.closest('[data-pay-method]');if(pm){state.paymentMethod=pm.dataset.payMethod;renderKasir()}
    const cs=e.target.closest('[data-cash-set]');if(cs){state.cashReceived=Number(cs.dataset.cashSet);renderKasir()}
    const lb=e.target.closest('[data-load-bill]');if(lb)loadOpenBill(Number(lb.dataset.loadBill));
    const re=e.target.closest('[data-reprint-index]');if(re)reprintTransaction(Number(re.dataset.reprintIndex));
    const dp=e.target.closest('[data-delete-produk]');if(dp)deleteProduk(Number(dp.dataset.deleteProduk));
    const db2=e.target.closest('[data-delete-bahan]');if(db2)deleteBahan(Number(db2.dataset.deleteBahan));

    if(e.target.id==='saveOpenBillBtn')await saveOpenBill();
    if(e.target.id==='payNowBtn')await completePayment();
    if(e.target.id==='newBillBtn'){state.cart=[];state.cashReceived=0;state.orderName='';renderKasir()}
    if(e.target.id==='addProdukBtn'){
      const n=document.getElementById('produkNama').value.trim();if(!n)return alert('Nama produk wajib diisi');
      db.Produk.push({nama:n,kategori:document.getElementById('produkKategori').value,harga:Number(document.getElementById('produkHarga').value||0),aktif:document.getElementById('produkAktif').value});
      const ok=await trySaveSheets(['Produk'],'Produk tersimpan ke Supabase'); renderAll(); switchSection('produk'); if(!ok) return;
    }
    if(e.target.id==='addBahanBtn'){
      const n=document.getElementById('bahanNama').value.trim();if(!n)return alert('Nama bahan wajib diisi');
      db.Bahan.push({nama:n,satuan:document.getElementById('bahanSatuan').value,hargaSatuan:Number(document.getElementById('bahanHarga').value||0),stok:Number(document.getElementById('bahanStok').value||0)});
      const ok=await trySaveSheets(['Bahan'],'Bahan tersimpan ke Supabase'); renderAll(); switchSection('bahan'); if(!ok) return;
    }
    if(e.target.id==='addResepBtn'){
      db.Resep.push({produk:document.getElementById('newResepProduk').value,bahan:document.getElementById('newResepBahan').value,qty:Number(document.getElementById('newResepQty').value||0),satuan:document.getElementById('newResepSatuan').value});
      const ok=await trySaveSheets(['Resep'],'Resep tersimpan ke Supabase'); renderAll(); switchSection('resep'); if(!ok) return;
    }
    if(e.target.id==='addCustBtn'){
      db.Pelanggan.push({nama:document.getElementById('custNama').value,telepon:document.getElementById('custTelp').value,alamat:document.getElementById('custAlamat').value});
      const ok=await trySaveSheets(['Pelanggan'],'Pelanggan tersimpan ke Supabase'); renderAll(); switchSection('pelanggan'); if(!ok) return;
    }
    if(e.target.id==='addKasBtn'){
      db.Kas.push({tanggal:document.getElementById('kasTanggal').value,tipe:document.getElementById('kasTipe').value,kategori:document.getElementById('kasKategori').value,nominal:Number(document.getElementById('kasNominal').value||0),keterangan:document.getElementById('kasKet').value});
      const ok=await trySaveSheets(['Kas'],'KAS tersimpan ke Supabase'); renderAll(); switchSection('kas'); if(!ok) return;
    }
    if(e.target.id==='saveSettingBtn'){
      setSetting('nama_kafe',document.getElementById('setNamaKafe').value);
      setSetting('alamat_kafe',document.getElementById('setAlamatKafe').value);
      setSetting('printer_tamu',document.getElementById('setPrinterTamu').value);
      setSetting('printer_bar',document.getElementById('setPrinterBar').value);
      setSetting('printer_dapur',document.getElementById('setPrinterDapur').value);
      setSetting('auto_save',document.getElementById('setAutoSave').value);
      CONFIG.useMockData=false;
      const ok=await trySaveSheets(['Setting'],'Setting tersimpan ke Supabase'); renderAll(); switchSection('setting'); if(!ok) return;
    }
    if(e.target.id==='applyLapFilter'){state.historyFilterStart=document.getElementById('lapStart').value;state.historyFilterEnd=document.getElementById('lapEnd').value;renderLaporan()}
    if(e.target.id==='resetLapFilter'){state.historyFilterStart='';state.historyFilterEnd='';renderLaporan()}
    if(e.target.id==='todayLapFilter'){state.historyFilterStart=todayDate();state.historyFilterEnd=todayDate();renderLaporan()}
    if(e.target.id==='applyKasFilter'){state.kasFilterStart=document.getElementById('kasStart').value;state.kasFilterEnd=document.getElementById('kasEnd').value;renderKas()}
    if(e.target.id==='resetKasFilter'){state.kasFilterStart='';state.kasFilterEnd='';renderKas()}
    if(e.target.id==='todayKasFilter'){state.kasFilterStart=todayDate();state.kasFilterEnd=todayDate();renderKas()}
    if(e.target.id==='addKaryawanBtn'){const n=document.getElementById('newKaryawanName').value.trim(); if(!n) return alert('Nama karyawan wajib diisi'); db.Karyawan.push({nama:n,aktif:'Ya'}); ensurePayrollRow(n); trySaveSheets(['Karyawan','PayrollSetting'],'Karyawan tersimpan ke Supabase'); renderAll(); switchSection('karyawan');}
    if(e.target.id==='saveShiftBtn'){const tanggal=document.getElementById('shiftTanggal').value||todayDate(); db.ShiftKaryawan=db.ShiftKaryawan.filter(x=>x.tanggal!==tanggal); document.querySelectorAll('[data-shift-name]').forEach(sel=>{if(sel.value){const nama=sel.dataset.shiftName; const note=document.querySelector('[data-shift-note="'+nama+'"')?.value||''; db.ShiftKaryawan.push({tanggal,nama,shift:sel.value,catatan:note});}}); state.shiftTanggal=tanggal; renderKaryawan(); trySaveSheets(['ShiftKaryawan'],'Shift tersimpan ke Supabase');}
    if(e.target.id==='ownerLoginBtn'){ensureOwnerFallback(); const u=document.getElementById('ownerUser').value; const p=document.getElementById('ownerPass').value; const ok=db.Owner.find(x=>String(x.username||'').trim()===u && String(x.password||'').trim()===p); if(!ok) return alert('Login gagal. Cek sheet Owner atau gunakan akun fallback owner / 123456 bila sheet masih kosong.'); state.ownerLoggedIn=true; renderManajemen(); switchSection('manajemen');}
    if(e.target.id==='ownerLogoutBtn'){state.ownerLoggedIn=false; renderManajemen(); switchSection('manajemen');}
    if(e.target.id==='applyManajemenFilter'){state.manajemenStart=document.getElementById('manajemenStart').value; state.manajemenEnd=document.getElementById('manajemenEnd').value; renderManajemen(); switchSection('manajemen');}
    if(e.target.id==='resetManajemenFilter'){state.manajemenStart=startOfMonth(); state.manajemenEnd=todayDate(); renderManajemen(); switchSection('manajemen');}
  });

  document.addEventListener('change',e=>{
    if(e.target.id==='filterKategoriKasir'){state.productFilter=e.target.value;renderKasir()}
    if(e.target.id==='pelangganKasir'){state.selectedCustomer=e.target.value}
    if(e.target.id==='resepProdukSelect'){state.resepProdukTerpilih=e.target.value;renderResep()}
    if(e.target.id==='shiftTanggal'){state.shiftTanggal=e.target.value;renderKaryawan()}
  });

  document.addEventListener('input',e=>{
    if(e.target.id==='cashReceivedInput'){
      state.cashReceived=Number(e.target.value||0);
      // Update hanya kembalian tanpa full rerender
      const el=document.querySelector('.summary-row strong[style*="success"]');
      if(el)el.textContent=rupiah(changeAmount());
    }
    if(e.target.id==='orderNameInput'){state.orderName=e.target.value}
    if(e.target.id==='productSearch'){state.productSearch=e.target.value; const val=e.target.value.toLowerCase(); document.querySelectorAll('.product-thumb').forEach(card=>{const name=(card.querySelector('.thumb-name')?.textContent||'').toLowerCase(); card.style.display = name.includes(val)?'flex':'none';});}
  });
}

function setupRealtime(){Object.entries(TABLE_MAP).forEach(([sheet,table])=>{sbClient.channel('rt-'+table).on('postgres_changes',{event:'*',schema:'public',table},async()=>{try{await loadSheet(sheet);renderAll();switchSection(state.currentSection);}catch(e){console.error(e)}}).subscribe();});}
renderAll();bindUI();syncSheets(false);setupRealtime();
</script>
</body>
</html>
